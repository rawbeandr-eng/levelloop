<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THAPALIYA LEVEL LOOP CALCULATOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 1250px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        
        .meta-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
            padding: 15px;
            background: #f9f9fb;
            border-radius: 6px;
            border: 1px solid #e1e4e8;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-weight: bold; font-size: 13px; color: #555; }
        .input-group input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }

        .table-wrapper { overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #2c3e50; color: #fff; font-size: 13px; text-transform: uppercase; }
        
        td input { width: 95%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 14px; }
        .readonly { background-color: #f0f3f5; font-weight: bold; color: #2c3e50; }
        .elev-input { background-color: #e8f4f8; font-weight: bold; color: #2980b9; border: 2px solid #3498db; }

        .action-bar { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        button { border: none; padding: 12px 20px; cursor: pointer; border-radius: 4px; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .btn-add { background-color: #27ae60; color: white; }
        .btn-csv { background-color: #f39c12; color: white; }
        .btn-pdf { background-color: #e74c3c; color: white; }
        button:hover { opacity: 0.85; transform: translateY(-1px); }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            color: white;
        }
        .summary-item { display: flex; flex-direction: column; border-left: 3px solid #3498db; padding-left: 12px; }
        .summary-label { font-size: 11px; opacity: 0.8; text-transform: uppercase; margin-bottom: 4px; }
        .summary-value { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Thapaliya Level Loop</h2>

    <div class="meta-header">
        <div class="input-group">
            <label>Project / Designation</label>
            <input type="text" id="designation" placeholder="e.g., BROWN HALL">
        </div>
        <div class="input-group">
            <label>Date</label>
            <input type="date" id="surveyDate">
        </div>
    </div>
    
    <div class="table-wrapper">
        <table id="levelTable">
            <thead>
                <tr>
                    <th>STA</th>
                    <th>BS (+)</th>
                    <th>HI</th>
                    <th>FS (-)</th>
                    <th>ELEV</th>
                    <th>BS Dist</th>
                    <th>FS Dist</th>
                    <th>Cum. Dist</th>
                    <th>CORR</th>
                    <th>ADJ ELEV</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="action-bar">
        <button class="btn-add" onclick="addRow()">+ Add Station</button>
        <button class="btn-csv" onclick="exportToCSV()">Export CSV</button>
        <button class="btn-pdf" onclick="exportToPDF()">Download PDF</button>
    </div>

    <div class="summary-grid" id="summaryBlock">
        <div class="summary-item"><span class="summary-label">Sum BS</span><span class="summary-value" id="sumBs">0.000</span></div>
        <div class="summary-item"><span class="summary-label">Sum FS</span><span class="summary-value" id="sumFs">0.000</span></div>
        <div class="summary-item"><span class="summary-label">Page Check</span><span class="summary-value" id="pageCheck">0.000</span></div>
        <div class="summary-item"><span class="summary-label">Total Dist (TD)</span><span class="summary-value" id="totalDist">0.00</span></div>
        <div class="summary-item"><span class="summary-label">Closure Error (EC)</span><span class="summary-value" id="closureError">0.000</span></div>
        <div class="summary-item"><span class="summary-label">Allowable Error (AE)</span><span class="summary-value" id="allowableError">0.000</span></div>
        <div class="summary-item"><span class="summary-label">Correction Factor (K)</span><span class="summary-value" id="kFactor">0.000000</span></div>
    </div>
</div>

<script>
    const tableBody = document.getElementById('tableBody');
    window.onload = () => { 
        document.getElementById('surveyDate').valueAsDate = new Date();
        for(let i=0; i<5; i++) addRow(); 
    };

    function addRow() {
        const isFirst = tableBody.children.length === 0;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="sta" oninput="calculate()"></td>
            <td><input type="number" step="0.001" class="bs" oninput="calculate()"></td>
            <td class="readonly hi"></td>
            <td><input type="number" step="0.001" class="fs" oninput="calculate()" ${isFirst ? 'disabled' : ''}></td>
            <td>${isFirst ? '<input type="number" step="0.001" class="elev-input" oninput="calculate()" placeholder="Start">' : '<span class="readonly elev"></span>'}</td>
            <td><input type="number" step="0.1" class="bsDist" oninput="calculate()"></td>
            <td><input type="number" step="0.1" class="fsDist" oninput="calculate()" ${isFirst ? 'disabled' : ''}></td>
            <td class="readonly cumDist"></td>
            <td class="readonly corr"></td>
            <td class="readonly adjElev"></td>
        `;
        tableBody.appendChild(tr);
    }

    function calculate() {
        const rows = document.querySelectorAll('#tableBody tr');
        const firstElevIn = document.querySelector('.elev-input');
        let startElev = firstElevIn ? parseFloat(firstElevIn.value) : 0;
        if (isNaN(startElev)) startElev = 0;

        let prevHi = 0, prevElev = startElev, cumDist = 0, sumBs = 0, sumFs = 0, lastElev = startElev;

        rows.forEach((row, idx) => {
            const bs = parseFloat(row.querySelector('.bs').value);
            const fs = parseFloat(row.querySelector('.fs').value);
            const bsD = parseFloat(row.querySelector('.bsDist').value) || 0;
            const fsD = parseFloat(row.querySelector('.fsDist').value) || 0;

            let curElev = (idx === 0) ? startElev : (isNaN(fs) ? prevElev : prevHi - fs);
            if (idx !== 0) row.querySelector('.elev').innerText = curElev.toFixed(3);
            if (!isNaN(fs)) { sumFs += fs; lastElev = curElev; }

            let curHi = !isNaN(bs) ? curElev + bs : NaN;
            if (!isNaN(bs)) sumBs += bs;
            row.querySelector('.hi').innerText = isNaN(curHi) ? '' : curHi.toFixed(3);

            cumDist += (bsD + fsD);
            row.querySelector('.cumDist').innerText = cumDist > 0 ? cumDist.toFixed(2) : '';
            prevElev = curElev; if (!isNaN(curHi)) prevHi = curHi;
        });

        const tc = startElev - lastElev;
        const k = cumDist > 0 ? (tc / cumDist) : 0;
        const ae = 0.05 * Math.sqrt(cumDist / 5280);

        document.getElementById('sumBs').innerText = sumBs.toFixed(3);
        document.getElementById('sumFs').innerText = sumFs.toFixed(3);
        document.getElementById('pageCheck').innerText = (sumBs - sumFs).toFixed(3);
        document.getElementById('totalDist').innerText = cumDist.toFixed(2);
        document.getElementById('closureError').innerText = (lastElev - startElev).toFixed(3);
        document.getElementById('allowableError').innerText = '±' + ae.toFixed(3);
        document.getElementById('kFactor').innerText = k.toFixed(6);

        rows.forEach((row, idx) => {
            const cElev = (idx === 0) ? startElev : parseFloat(row.querySelector('.elev').innerText || 0);
            const cDist = parseFloat(row.querySelector('.cumDist').innerText || 0);
            if (cDist > 0 || idx === 0) {
                const corr = cDist * k;
                row.querySelector('.corr').innerText = corr.toFixed(3);
                row.querySelector('.adjElev').innerText = (cElev + corr).toFixed(3);
            }
        });
    }

    function exportToCSV() {
        const designation = document.getElementById('designation').value || "Survey_Export";
        const rows = [["STA", "BS", "HI", "FS", "ELEV", "BS_DIST", "FS_DIST", "CUM_DIST", "CORR", "ADJ_ELEV"]];
        document.querySelectorAll('#tableBody tr').forEach((tr, i) => {
            const rowData = Array.from(tr.cells).map(cell => {
                const input = cell.querySelector('input');
                return input ? input.value : cell.innerText;
            });
            rows.push(rowData);
        });
        let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `${designation}.csv`);
        document.body.appendChild(link);
        link.click();
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const designation = document.getElementById('designation').value || "Untitled Project";
        const date = document.getElementById('surveyDate').value;

        doc.setFontSize(18); doc.text("Differential Leveling Field Notes", 14, 20);
        doc.setFontSize(11); doc.text(`Designation: ${designation}`, 14, 30);
        doc.text(`Date: ${date}`, 14, 35);

        const body = Array.from(document.querySelectorAll('#tableBody tr')).map(tr => 
            Array.from(tr.cells).map(cell => cell.querySelector('input') ? cell.querySelector('input').value : cell.innerText)
        );

        doc.autoTable({
            startY: 45,
            head: [["STA", "BS (+)", "HI", "FS (-)", "ELEV", "BS Dist", "FS Dist", "Cum D", "CORR", "ADJ ELEV"]],
            body: body,
            theme: 'grid',
            headStyles: { fillColor: [44, 62, 80] }
        });

        const finalY = doc.lastAutoTable.finalY + 10;
        doc.text("Summary Analysis:", 14, finalY);
        doc.text(`Error of Closure: ${document.getElementById('closureError').innerText} ft`, 14, finalY + 7);
        doc.text(`Total Distance: ${document.getElementById('totalDist').innerText} ft`, 14, finalY + 12);
        doc.text(`K Factor: ${document.getElementById('kFactor').innerText}`, 14, finalY + 17);

        doc.save(`${designation}_Leveling_Loop.pdf`);
    }
</script>
</body>
</html>
