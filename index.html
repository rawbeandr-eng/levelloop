<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thapaliya Differential Leveling Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            min-width: 900px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: #fff;
            font-size: 14px;
        }
        td input {
            width: 90%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            box-sizing: border-box;
        }
        td input:disabled {
            background-color: #f9f9f9;
            border-color: #eee;
            cursor: not-allowed;
        }
        .readonly {
            background-color: #eef2f3;
            font-weight: bold;
            color: #2c3e50;
            min-width: 60px;
            display: table-cell;
        }
        .elev-input {
            background-color: #e8f4f8;
            font-weight: bold;
            color: #2980b9;
            border: 2px solid #3498db;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #bdc3c7;
        }
        .summary-item {
            display: flex;
            flex-direction: column;
        }
        .summary-label {
            font-size: 12px;
            color: #7f8c8d;
            font-weight: bold;
            text-transform: uppercase;
        }
        .summary-value {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Differential Leveling Calculator</h2>
    
    <table id="levelTable">
        <thead>
            <tr>
                <th>STA</th>
                <th>BS (+)</th>
                <th>HI</th>
                <th>FS (-)</th>
                <th>ELEV</th>
                <th>BS Dist</th>
                <th>FS Dist</th>
                <th>Cum. Dist</th>
                <th>CORR</th>
                <th>ADJ ELEV</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <button onclick="addRow()">+ Add Station Row</button>

    <div class="summary-grid">
        <div class="summary-item">
            <span class="summary-label">Sum BS</span>
            <span class="summary-value" id="sumBs">0.00</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Sum FS</span>
            <span class="summary-value" id="sumFs">0.00</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Page Check (BS - FS)</span>
            <span class="summary-value" id="pageCheck">0.00</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Total Dist (TD)</span>
            <span class="summary-value" id="totalDist">0.00</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Error of Closure (EC)</span>
            <span class="summary-value" id="closureError">0.00</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Allowable Error (AE)</span>
            <span class="summary-value" id="allowableError">0.00</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Total Correction (TC)</span>
            <span class="summary-value" id="totalCorr">0.00</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">K Factor (TC / TD)</span>
            <span class="summary-value" id="kFactor">0.000000</span>
        </div>
    </div>
</div>

<script>
    const tableBody = document.getElementById('tableBody');

    // Initialize with 4 blank rows
    window.onload = () => {
        for(let i=0; i<4; i++) addRow();
    };

    function addRow() {
        const isFirst = tableBody.children.length === 0;
        const tr = document.createElement('tr');
        
        // The first row has an editable ELEV input and disabled FS fields. 
        // Subsequent rows have a read-only ELEV span.
        tr.innerHTML = `
            <td><input type="text" class="sta" oninput="calculate()"></td>
            <td><input type="number" step="0.01" class="bs" oninput="calculate()"></td>
            <td class="readonly hi"></td>
            <td><input type="number" step="0.01" class="fs" oninput="calculate()" ${isFirst ? 'disabled' : ''}></td>
            <td>
                ${isFirst 
                    ? '<input type="number" step="0.01" class="elev-input" oninput="calculate()" placeholder="BM Elev">' 
                    : '<span class="readonly elev"></span>'
                }
            </td>
            <td><input type="number" step="0.01" class="bsDist" oninput="calculate()"></td>
            <td><input type="number" step="0.01" class="fsDist" oninput="calculate()" ${isFirst ? 'disabled' : ''}></td>
            <td class="readonly cumDist"></td>
            <td class="readonly corr"></td>
            <td class="readonly adjElev"></td>
        `;
        tableBody.appendChild(tr);
        calculate();
    }

    function calculate() {
        const rows = document.querySelectorAll('#tableBody tr');
        
        // Grab the starting elevation directly from the first row's input
        const firstRowElevInput = document.querySelector('.elev-input');
        let startElev = firstRowElevInput ? parseFloat(firstRowElevInput.value) : 0;
        if (isNaN(startElev)) startElev = 0;

        let prevHi = 0;
        let prevElev = startElev;
        let cumulativeDist = 0;
        let sumBs = 0;
        let sumFs = 0;

        let lastCalculatedElev = startElev;

        // First Pass: Calculate standard HI, ELEV, and cumulative totals
        rows.forEach((row, index) => {
            const bsInput = row.querySelector('.bs').value;
            const fsInput = row.querySelector('.fs').value;
            const bsDistInput = row.querySelector('.bsDist').value;
            const fsDistInput = row.querySelector('.fsDist').value;

            const bs = parseFloat(bsInput);
            const fs = parseFloat(fsInput);
            const bsD = parseFloat(bsDistInput) || 0;
            const fsD = parseFloat(fsDistInput) || 0;

            let currentElev = prevElev;
            let currentHi = prevHi;

            // Elevation calc
            if (index === 0) {
                currentElev = startElev;
            } else if (!isNaN(fs)) {
                currentElev = prevHi - fs;
                sumFs += fs;
                lastCalculatedElev = currentElev;
            }

            // Only update ELEV text if it's NOT the first row 
            if (index !== 0) {
                row.querySelector('.elev').innerText = currentElev.toFixed(2);
            }

            // HI calc
            if (!isNaN(bs)) {
                currentHi = currentElev + bs;
                sumBs += bs;
            } else {
                currentHi = NaN; 
            }

            row.querySelector('.hi').innerText = isNaN(currentHi) ? '' : currentHi.toFixed(2);

            // Distances
            cumulativeDist += (bsD + fsD);
            row.querySelector('.cumDist').innerText = cumulativeDist > 0 ? cumulativeDist.toFixed(2) : '';

            // Update for next iteration
            prevElev = currentElev;
            if (!isNaN(currentHi)) prevHi = currentHi;
        });

        // Summary Calculations
        const tc = startElev - lastCalculatedElev;
        const k = cumulativeDist > 0 ? (tc / cumulativeDist) : 0;
        const pageCheck = sumBs - sumFs;
        const ec = lastCalculatedElev - startElev;
        const ae = 0.05 * Math.sqrt(cumulativeDist / 5280);

        document.getElementById('sumBs').innerText = sumBs.toFixed(2);
        document.getElementById('sumFs').innerText = sumFs.toFixed(2);
        document.getElementById('pageCheck').innerText = pageCheck.toFixed(2);
        document.getElementById('totalDist').innerText = cumulativeDist.toFixed(2);
        document.getElementById('closureError').innerText = ec.toFixed(3);
        document.getElementById('allowableError').innerText = '± ' + ae.toFixed(3);
        document.getElementById('totalCorr').innerText = tc.toFixed(3);
        document.getElementById('kFactor').innerText = k.toFixed(6);

        // Second Pass: Apply Corrections and Calculate Adjusted Elevations
        rows.forEach((row, index) => {
            let currentElev = 0;
            if (index === 0) {
                currentElev = startElev;
            } else {
                const elevTxt = row.querySelector('.elev').innerText;
                if (elevTxt !== '') currentElev = parseFloat(elevTxt);
            }

            const cumDistTxt = row.querySelector('.cumDist').innerText;

            if (cumDistTxt !== '' && (index === 0 ? !isNaN(startElev) && startElev !== 0 : true)) {
                const cumDist = parseFloat(cumDistTxt);
                const corr = cumDist * k;
                const adjElev = currentElev + corr;

                row.querySelector('.corr').innerText = corr.toFixed(3);
                row.querySelector('.adjElev').innerText = adjElev.toFixed(2);
            } else {
                row.querySelector('.corr').innerText = '';
                row.querySelector('.adjElev').innerText = '';
            }
        });
    }
</script>

</body>
</html>
